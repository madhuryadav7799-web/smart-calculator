name: Build Smart Calculator APK

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'adopt'
          java-version: '11'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
        with:
          api-level: 34
          build-tools: '34.0.0'
      
      - name: Install dependencies
        run: npm install
      
      - name: Prebuild Android
        run: npm run prebuild -- --no-install
      
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
      
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: SmartCalculator-APK
          path: android/app/build/outputs/apk/release/app-release.apk
      
      - name: Copy to releases
        run: |
          mkdir -p releases
          cp android/app/build/outputs/apk/release/app-release.apk releases/SmartCalculator-final.apk
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: releases/SmartCalculator-final.apk
