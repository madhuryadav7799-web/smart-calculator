name: Build Smart Calculator APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: apps/smart-calculator
        run: npm install

      - name: Create local.properties
        working-directory: apps/smart-calculator/android
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Build APK
        working-directory: apps/smart-calculator/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}
          JAVA_TOOL_OPTIONS: "-Xmx4g"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SmartCalculator-Debug-APK
          path: apps/smart-calculator/android/app/build/outputs/apk/debug/app-debug.apk
